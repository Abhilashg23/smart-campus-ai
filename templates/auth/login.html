{% extends "base.html" %}

{% block title %}Login - Smart Campus{% endblock %}

{% block extra_css %}
<style>
    .login-wrapper {
        flex: 1;
        display: flex;
        width: 100%;
        min-height: calc(100vh - 70px);
        padding: 2rem 1rem;
        box-sizing: border-box;
        background-image: url('{{ url_for('static', filename='images/slides/Main_Block.jpeg') }}');
        background-size: cover;
        background-position: center;
        position: relative;
    }
    
    .login-wrapper::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(79, 70, 229, 0.2));
    }
    
    .login-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2.5rem;
        border-radius: 24px;
        width: 100%;
        max-width: 420px;
        position: relative;
        z-index: 10;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        margin: auto; /* Fixes top clipping on small screens */
    }
    
    .login-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        text-align: center;
        color: white;
    }
    
    .login-subtitle {
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
    }
    
    .form-group {
        margin-bottom: 1.25rem;
    }
    
    .form-label {
        display: block;
        margin-bottom: 0.75rem;
        color: white !important;
        font-weight: 600;
        font-size: 0.9rem;
        opacity: 0.9;
    }
    
    .form-input {
        width: 100%;
        padding: 1rem 1.25rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: white !important;
        font-size: 1rem;
        transition: all 0.3s;
    }
    
    .form-input:-webkit-autofill,
    .form-input:-webkit-autofill:hover,
    .form-input:-webkit-autofill:focus,
    .form-input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px rgba(15, 23, 42, 0.9) inset !important;
        -webkit-text-fill-color: white !important;
        transition: background-color 5000s ease-in-out 0s;
    }
    
    .form-input:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
    }
    
    .login-btn {
        width: 100%;
        padding: 1rem;
        background: var(--primary);
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 1rem;
    }
    
    .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.5);
        background: #4338ca;
    }
    
    .footer-links {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-muted);
    }
    
    .footer-links a {
        color: white;
        text-decoration: none;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 1rem;">
            <i class="fas fa-user-shield" style="font-size: 3rem; color: #8b5cf6;"></i>
        </div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to your Smart Campus account</p>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        
        <div class="footer-links">
            Don't have an account? <a href="#">Request Access</a>
        </div>
    </div>
</div>
{% endblock %}
